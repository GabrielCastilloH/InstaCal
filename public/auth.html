<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>InstaCal – Signing in</title>
  <link rel="stylesheet" href="colors.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: var(--color-bg-page);
      color: var(--color-text-secondary);
    }
    .msg { text-align: center; font-size: 16px; }
    .sub { font-size: 13px; color: var(--color-text-muted); margin-top: 8px; }
    .err { color: var(--color-failure); }
  </style>
</head>
<body>
  <div class="msg" id="status">Signing in with Google…</div>
  <script src="auth.js"></script>
</body>
</html>
